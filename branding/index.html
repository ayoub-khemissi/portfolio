<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branding - Bannière LinkedIn - Ayoub KHEMISSI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'montserrat': ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        'gold': '#d4af37',
                        'gold-light': '#f4d03f',
                        'gold-dark': '#c9a227',
                    }
                }
            }
        }
    </script>
    <style>
        .text-gradient {
            background: linear-gradient(135deg, #d4af37, #f4d03f, #c9a227);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .gold-gradient {
            background: linear-gradient(135deg, #d4af37, #f4d03f, #c9a227, #d4af37);
        }

        .gold-line-gradient {
            background: linear-gradient(90deg, #d4af37, #f4d03f, #c9a227);
        }

        .client-logo {
            filter: grayscale(1) brightness(0) invert(1);
            opacity: 0.8;
            mix-blend-mode: lighten;
        }

        .highlight-circle {
            stroke-dasharray: 500;
            stroke-dashoffset: 0;
        }
    </style>
</head>

<body class="font-montserrat bg-[#111] min-h-screen flex flex-col justify-center items-center p-8 gap-8">

    <h2 class="text-gray-500 uppercase tracking-widest text-sm font-semibold">Bannière LinkedIn — 1584 &times; 396</h2>

    <!-- LinkedIn Banner 1584x396 -->
    <div
        class="w-[1584px] h-[396px] bg-gradient-to-br from-[#0a0a0a] via-[#141414] to-[#0a0a0a] relative overflow-hidden flex items-center">

        <!-- Gold top line -->
        <div class="absolute top-0 left-0 right-0 h-[3px] gold-line-gradient"></div>

        <!-- Decorative glow top-right -->
        <div
            class="absolute -top-40 -right-40 w-[500px] h-[500px] bg-[radial-gradient(circle,rgba(212,175,55,0.12)_0%,transparent_70%)] pointer-events-none">
        </div>

        <!-- Decorative glow bottom-left -->
        <div
            class="absolute -bottom-32 -left-32 w-80 h-80 bg-[radial-gradient(circle,rgba(212,175,55,0.06)_0%,transparent_70%)] pointer-events-none">
        </div>

        <!-- Subtle grid pattern overlay -->
        <div class="absolute inset-0 opacity-[0.03]"
            style="background-image: radial-gradient(circle, #d4af37 1px, transparent 1px); background-size: 40px 40px;">
        </div>

        <!-- Content -->
        <div class="flex items-center gap-14 relative z-10 w-full px-16">

            <!-- Left: Spacer (photo removed) -->
            <div class="flex-shrink-0 w-[306px] h-52"></div>

            <!-- Center: Hook + Info -->
            <div class="flex-1 min-w-0 whitespace-nowrap mt-6">
                <h1 class="text-[48px] font-extrabold tracking-tight leading-[1.1] mb-2">
                    <span class="text-white">Je transforme </span>
                    <span class="relative inline-block px-2">
                        <svg class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[115%] h-[150%] -z-10"
                            viewBox="0 0 200 80" preserveAspectRatio="none" fill="none"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M10,40 Q50,10 100,15 T190,40 T100,70 T10,40" stroke="#2563eb" stroke-width="3"
                                stroke-linecap="round" stroke-linejoin="round" class="highlight-circle" />
                        </svg>
                        <span class="relative z-10 text-white drop-shadow-[0_0_12px_rgba(37,99,235,0.4)]">vos
                            idées</span>
                    </span>
                    <span class="text-white"> en</span><br>
                    <span class="text-gradient">applications performantes</span>
                </h1>
                <p class="text-2xl text-gray-200 mt-3">
                    Expert <span class="text-white font-semibold">React & TypeScript</span>
                    <br>
                    <span class="text-white/60 font-medium tracking-wide uppercase text-base">Startups & Grands Comptes</span>
                </p>
            </div>

            <!-- Right: Mockup -->
            <div class="flex-shrink-0 mt-2 -mr-20">
                <img src="../img/mockup/mockup-3-devices.png" alt="Mockup 3 devices"
                    class="h-[350px] w-auto object-contain drop-shadow-[0_0_30px_rgba(212,175,55,0.15)]">
            </div>
        </div>

        <!-- Bottom bar: stats + linkedin -->
        <div class="absolute bottom-6 left-[426px] right-6 flex items-center">
            <!-- Stats (centered) -->
            <div class="flex-1 flex items-center gap-8">
                <div class="flex items-center gap-2">
                    <span class="text-3xl font-extrabold text-gradient">8+</span>
                    <span class="text-sm text-gray-300 uppercase tracking-wide">ans d'expertise</span>
                </div>
                <div class="w-1 h-1 rounded-full bg-gold/40"></div>
                <div class="flex items-center gap-2">
                    <span class="text-3xl font-extrabold text-gradient">30+</span>
                    <span class="text-sm text-gray-300 uppercase tracking-wide">projets livrés</span>
                </div>
                <div class="w-1 h-1 rounded-full bg-gold/40"></div>
                <div class="flex items-center gap-2">
                    <span class="text-3xl font-extrabold text-gradient">100%</span>
                    <span class="text-sm text-gray-300 uppercase tracking-wide">satisfaction</span>
                </div>
            </div>
        </div>

        <!-- Client trust bubbles -->
        <div class="absolute top-6 left-[426px] flex items-center gap-3 z-20 bg-white/10 backdrop-blur-xl border border-gold/20 rounded-[999px] pl-2.5 pr-4 py-1 shadow-[0_4px_30px_rgba(212,175,55,0.1)] scale-110 origin-left">
            <div class="flex items-center -space-x-3">
                <img src="../img/testimonials/g-manon.jpg" alt="G. Manon" class="w-9 h-9 rounded-full object-cover border-2 border-[#0a0a0a] relative z-[6]">
                <img src="../img/testimonials/v-phung.jpg" alt="V. Phung" class="w-9 h-9 rounded-full object-cover border-2 border-[#0a0a0a] relative z-[5]">
                <img src="../img/testimonials/d-mbaye.jpg" alt="D. Mbaye" class="w-9 h-9 rounded-full object-cover border-2 border-[#0a0a0a] relative z-[4]">
                <img src="../img/testimonials/m-ayour.jpg" alt="M. Ayour" class="w-9 h-9 rounded-full object-cover border-2 border-[#0a0a0a] relative z-[3]">
                <img src="../img/testimonials/r-ayoub.jpg" alt="R. Ayoub" class="w-9 h-9 rounded-full object-cover border-2 border-[#0a0a0a] relative z-[2]">
                <img src="../img/testimonials/s-mehdi.png" alt="S. Mehdi" class="w-9 h-9 rounded-full object-cover border-2 border-[#0a0a0a] relative z-[1]">
            </div>
            <span class="text-[11px] text-gold font-bold uppercase tracking-widest">Ils me font confiance</span>
            <div class="w-px h-5 bg-gold/30"></div>
            <div class="flex items-center gap-1.5">
                <img src="malt.svg" alt="Malt" class="h-7 w-auto">
            </div>
            <div class="flex items-center gap-0.5">
                <svg class="w-[18px] h-[18px] text-gold" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                <svg class="w-[18px] h-[18px] text-gold" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                <svg class="w-[18px] h-[18px] text-gold" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                <svg class="w-[18px] h-[18px] text-gold" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
                <svg class="w-[18px] h-[18px] text-gold" viewBox="0 0 20 20" fill="currentColor"><path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/></svg>
            </div>
        </div>
    </div>

</body>

</html>
